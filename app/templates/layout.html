<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{{ title }} — MoneyTracker</title>
  <link rel="icon" type="image/x-icon"
        href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

{% include 'components/navbar.html' %}
<div class="wrapper d-flex">
  <aside class="sidebar">
    <nav class="nav flex-column pt-3 gap-1">
      <a class="nav-link {% if request.blueprint == 'main' %}active{% endif %}"
         href="{{ url_for('main.index') }}">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a class="nav-link {% if request.blueprint == 'transaction' %}active{% endif %}"
         href="{{ url_for('transaction.index') }}">
        <i class="bi bi-arrow-left-right"></i> Transactions
      </a>
      <a class="nav-link {% if request.blueprint == 'category' %}active{% endif %}"
         href="{{ url_for('category.index') }}">
        <i class="bi bi-tags"></i> Categories
      </a>
      <a class="nav-link {% if request.blueprint == 'budget' %}active{% endif %}"
         href="{{ url_for('budget.index') }}">
        <i class="bi bi-wallet2"></i> Budget
      </a>
      <hr class="sidebar-divider">
      <a class="nav-link {% if request.blueprint == 'profile' %}active{% endif %}"
         href="{{ url_for('profile.view_profile') }}">
        <i class="bi bi-person-circle"></i> Profile
      </a>
      <a class="nav-link" href="{{ url_for('auth.logout') }}">
        <i class="bi bi-box-arrow-right"></i> Log Out
      </a>
    </nav>
  </aside>
  <main class="main-content flex-grow-1 p-4">
    {% include 'components/flash.html' %}
    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
